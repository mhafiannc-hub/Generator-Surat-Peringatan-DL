<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator SP - Dua Legenda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100">

    <header class="bg-white border-b p-4 no-print relative z-10 shadow-sm">
        <div class="max-w-full px-4 lg:px-8">
            <h1 class="text-xl font-black text-slate-900 tracking-tight uppercase flex items-center">
                <span class="bg-slate-900 text-white px-2 py-1 rounded mr-3 text-sm">DL</span>
                Generator Surat Peringatan Dua Legenda
            </h1>
        </div>
    </header>

    <div class="flex flex-col lg:flex-row h-[calc(100vh-65px)] overflow-hidden">
        
        <div class="w-full lg:w-[380px] p-6 space-y-6 no-print bg-slate-50 border-r sidebar-scroll overflow-y-auto shrink-0">
            
            <div class="flex space-x-1 bg-slate-200 p-1 rounded-lg">
                <button onclick="switchTab('input')" id="btn-tab-input" class="flex-1 py-2 text-sm rounded-md font-bold transition bg-white text-slate-800 shadow-sm">Input Data</button>
                <button onclick="switchTab('settings')" id="btn-tab-settings" class="flex-1 py-2 text-sm rounded-md font-bold transition text-slate-600 hover:bg-slate-300">Template</button>
            </div>

            <div id="tab-input" class="tab-content active space-y-5">
                <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest border-b pb-2">Data Karyawan</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Nama Lengkap</label>
                        <input type="text" id="inputNama" placeholder="Contoh: Budi Santoso" class="w-full p-2.5 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-
